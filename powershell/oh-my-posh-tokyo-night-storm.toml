"$schema" = "https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json"
version = 3
final_space = true
console_title_template = " {{ .Folder }} :: {{if .Root}}Admin{{end}}"
terminal_background = "p:t-background"

[palette]
"main-bg"         = "#24283b"
"terminal-red"    = "#f7768e"
"pistachio-green" = "#9ece6a"
"terminal-green"  = "#73daca"
"terminal-yellow" = "#e0af68"
"terminal-blue"   = "#7aa2f7"
"celeste-blue"    = "#b4f9f8"
"light-sky-blue"  = "#7dcfff"
"terminal-white"  = "#c0caf5"
"white-blue"      = "#a9b1d6"
"blue-bell"       = "#9aa5ce"
"pastal-grey"     = "#cfc9c2"
"terminal-magenta"= "#bb9af7"
"blue-black"      = "#565f89"
"terminal-black"  = "#414868"
"t-background"    = "p:main-bg"

# ── Block 1: left prompt ──────────────────────────────────────────────────────

[[blocks]]
  alignment = "left"
  type = "prompt"

  [[blocks.segments]]
    type       = "text"
    style      = "plain"
    background = "transparent"
    foreground = "p:terminal-blue"
    template   = "➜ "

  [[blocks.segments]]
    type       = "path"
    style      = "plain"
    foreground = "p:terminal-magenta"
    template   = "{{ if eq .Env.POSH_PATH_FULL \"1\" }}<b>{{ .Location }}</b>{{ else }}<b>{{ .Path }}</b>{{ end }} <p:light-sky-blue>⚡</>"

    [blocks.segments.properties]
      style     = "powerlevel"
      max_width = 40

  [[blocks.segments]]
    type       = "git"
    style      = "plain"
    foreground = "p:light-sky-blue"
    foreground_templates = [
      "{{ if or (.Working.Changed) (.Staging.Changed) }}p:terminal-red{{ end }}",
      "{{ if and (gt .Ahead 0) (gt .Behind 0)}}p:light-sky-blue {{ end }}",
      "{{ if gt .Ahead 0 }}p:terminal-blue{{ end }}",
      "{{ if gt .Behind 0 }}p:celeste-blue{{ end }}"
    ]
    template = "({{ .HEAD}})"

    [blocks.segments.properties]
      fetch_status = true
      branch_icon  = "\ue725 "

  [[blocks.segments]]
    type       = "status"
    style      = "plain"
    foreground = "p:terminal-red"
    template   = " \uf00d"

# ── Block 2: right prompt ─────────────────────────────────────────────────────

[[blocks]]
  alignment = "right"
  overflow  = "hide"
  type      = "prompt"

  [[blocks.segments]]
    type       = "node"
    style      = "plain"
    foreground = "p:pistachio-green"
    template   = "\ue718 {{ .Full }}"

  [[blocks.segments]]
    type       = "php"
    style      = "plain"
    foreground = "p:terminal-blue"
    template   = "\ue73d {{ .Full }} "

  [[blocks.segments]]
    type       = "python"
    style      = "plain"
    foreground = "p:terminal-yellow"
    template   = "\uE235 {{ .Full }}"

  [[blocks.segments]]
    type       = "julia"
    style      = "plain"
    foreground = "p:terminal-magenta"
    template   = "\uE624 {{ .Full }}"

  [[blocks.segments]]
    type       = "ruby"
    style      = "plain"
    foreground = "p:terminal-red"
    template   = "\uE791 {{ .Full}}"

  [[blocks.segments]]
    type       = "go"
    style      = "plain"
    foreground = "p:light-sky-blue"
    template   = "\uFCD1 {{ .Full}}"

  [[blocks.segments]]
    type       = "command"
    style      = "plain"
    foreground = "p:white-blue"

    [blocks.segments.properties]
      command = "git log --pretty=format:%cr -1 || date +%H:%M:%S"
      shell   = "bash"

# ── Block 3: second line ──────────────────────────────────────────────────────

[[blocks]]
  alignment = "left"
  newline   = true
  type      = "prompt"

  [[blocks.segments]]
    type       = "text"
    style      = "plain"
    foreground = "p:pistachio-green"
    template   = "▶"

# ── Transient / secondary prompts ────────────────────────────────────────────

[secondary_prompt]
  background = "transparent"
  foreground = "p:terminal-blue"
  template   = "➜ "

[transient_prompt]
  background = "p:t-background"
  foreground = "p:terminal-blue"
  template   = "➜ "
